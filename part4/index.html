<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据结构动画演示</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.7;
      background: #f6f8fb;
      color: #1f2937;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    header {
      margin-bottom: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #111827;
    }

    .subtitle {
      margin: 0;
      color: #64748b;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    h2 {
      margin: 0 0 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 20px;
      color: #0f172a;
    }

    a {
      display: block;
      margin-top: 10px;
      padding: 12px 14px;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      background: #eff6ff;
      color: #1d4ed8;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    a:hover,
    a:focus {
      border-color: #93c5fd;
      background: #dbeafe;
      transform: translateY(-1px);
      outline: none;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 24px, 1080px);
        padding-top: 28px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>数据结构动画演示</h1>
      <p class="subtitle">按知识点快速进入对应的可视化页面</p>
    </header>

    <div class="grid">
      <section class="section">
        <h2>字符串</h2>
        <a href="./4next_array.html">KMP next 数组演示</a>
      </section>

      <section class="section">
        <h2>树结构</h2>
        <a href="./7.1bst.html">二叉搜索树 BST 演示</a>
        <a href="./7.2avl.html">AVL 树演示</a>
        <a href="./7.3红黑树.html">红黑树演示</a>
        <a href="./7.4b树.html">B 树演示</a>
      </section>

      <section class="section">
        <h2>排序算法</h2>
        <a href="./8.1直接插入排序.html">直接插入排序演示</a>
        <a href="./8.2.1冒泡排序.html">冒泡排序演示</a>
        <a href="./8.2.2快速排序.html">快速排序演示</a>
        <a href="./8.3.1简单选择排序.html">简单选择排序演示</a>
        <a href="./8.3.2堆排序.html">堆排序演示</a>
        <a href="./8.5.1归并排序.html">归并排序演示</a>
        <a href="./8.5.2计数排序.html">计数排序演示</a>
      </section>
    </div>
  </main>
</body>
</html>
